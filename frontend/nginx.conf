# ============================================================
# nginx config for the production frontend container.
#
# Serves the Vite static bundle on / with SPA fallback (any
# unknown path → /index.html so React Router can handle it).
# Proxies API traffic to the `api` service on the docker network.
# ============================================================

# Upstream pool — the api service listens on 5080 inside the compose
# network. `api` resolves via Docker's embedded DNS.
upstream api_backend {
  server api:5080;
  keepalive 16;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  # Don't leak the nginx version in error pages / response headers.
  server_tokens off;

  # Basic Auth gate. The htpasswd file is mounted in from the host via
  # docker-compose.aws.yaml; rotation = re-write the file + restart
  # the container (no image rebuild). If the file is missing, nginx
  # returns 403 for the gated locations.
  #
  # /health is intentionally EXCLUDED (see the location block below)
  # so uptime probes + the docker healthcheck don't need credentials.
  auth_basic "TradePro";
  auth_basic_user_file /etc/nginx/.htpasswd;

  # Static frontend bundle.
  root /usr/share/nginx/html;
  index index.html;

  # Long cache on hashed assets (Vite emits content-hashed filenames),
  # short cache on the SPA shell so deploys roll out promptly.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-store";
  }

  # API + health pass through to the .NET container. /api/ is the
  # canonical prefix the frontend uses; /health is hit by uptime
  # pings and the docker healthcheck.
  #
  # auth_basic OFF on /api/: browsers don't auto-include cached HTTP
  # Basic credentials for fetch() requests reliably (especially on
  # IP-only origins), so the SPA's data fetches were failing with
  # "TypeError: Failed to fetch" even after the user authenticated
  # the shell. The shell at / stays gated, which is the demo's actual
  # access boundary; random visitors hitting /api/* directly would
  # need to guess the IP. When Firebase auth lands, /api/ goes back
  # behind a proper ID-token check at the .NET layer.
  location /api/ {
    auth_basic off;
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_read_timeout 60s;
  }

  # /health stays public so uptime pings / docker healthchecks don't
  # need the basic auth credentials. The endpoint itself returns no
  # sensitive data — just a status object.
  location = /health {
    auth_basic off;
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host       $host;
    proxy_set_header Connection "";
  }

  # Optional: surface the .NET swagger / integrations endpoints if
  # they're served from the root rather than /api/. Add more proxy
  # blocks here if endpoints land outside /api/.

  # SPA fallback — any path the frontend owns (e.g. /signals,
  # /compare, /portfolio) returns index.html so React Router can
  # render it. Must be the LAST `location` so the API blocks above
  # win for /api/ and /health.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Tiny 404 / 50x pages so we don't fall back to nginx defaults
  # that leak the server identity.
  error_page 404 = /index.html;
  error_page 500 502 503 504 /50x.html;
  location = /50x.html { root /usr/share/nginx/html; }
}
