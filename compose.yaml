# Local dev stack — `docker compose up` gives you a hot-reloading API and
# frontend with the same URLs the browser would see in prod (just on
# localhost). The Python research package is intentionally NOT a service:
# you run `uv run tradepro-compare` natively on the host so the M-series
# perf advantage isn't wrapped in a container.
#
# Quick reference:
#   docker compose up                # both, foreground
#   docker compose up -d             # both, background
#   docker compose up frontend       # only frontend (run API natively for breakpoints)
#   docker compose logs -f api       # tail one service
#   docker compose down              # stop everything
#
# Hot reload:
#   - API uses `dotnet watch run` — edit a .cs file and it rebuilds in ~2s.
#   - Frontend uses Vite HMR — edit .tsx and the browser updates instantly.
#
# Env config:
#   Copy .env.compose.example to .env at the repo root, set the values you
#   care about. The .env file is gitignored.

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: tradepro-api
    ports:
      - "${API_PORT:-5080}:5080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5080
      # In dev the FirebaseAuth helper defaults RequireAuth to false, so
      # /api/* is open without a token — matches `dotnet run` natively.
      Firebase__RequireAuth: "false"
      # Static-token auth for /api/ingest/*. Falls back to a dev value if
      # the host hasn't set one.
      Ingest__Token: "${INGEST_TOKEN:-dev-ingest-token}"
      # Persisted compare cache — pushes survive `docker compose down`.
      Compare__StorePath: "/data/compare"
      # Open up CORS to the local frontend. The default config already
      # allows http://localhost:5173 — this just makes it explicit if the
      # operator overrides API_PORT.
      Cors__AllowedOrigins__0: "http://localhost:5173"
      # Browser uploads land here, the API forwards multipart payloads
      # to the Python sidecar at this URL. Inside compose the service
      # name 'extractor' resolves over the default network.
      Extractor__Url: "http://extractor:8000"
      # Trading 212 integration — off by default; flip TRADEPRO_T212_MODE
      # to `demo` (paper) or `live` (real money) in your .env file along
      # with the API key/secret pair from your T212 app. The integration
      # only enables read-only endpoints (status, instruments, positions);
      # order placement is intentionally not exposed.
      Trading212__Mode: "${TRADEPRO_T212_MODE:-disabled}"
      Trading212__ApiKey: "${TRADEPRO_T212_API_KEY:-}"
      Trading212__ApiSecret: "${TRADEPRO_T212_API_SECRET:-}"
    volumes:
      # Bind-mount source so dotnet watch picks up edits.
      - ./backend:/src
      # Anonymous volumes shadow the host's bin/obj — otherwise macOS
      # restore + container build clash and you get FileNotFoundException
      # on TradePro.Api.dll.
      - /src/TradePro.Api/bin
      - /src/TradePro.Api/obj
      # Persisted compare cache. Survives `docker compose down` because
      # it's a named volume; survives image rebuilds for the same reason.
      # Switch to a bind-mount of ~/.tradepro/server-cache if you want
      # to inspect the JSON files from the host.
      - api_compare_cache:/data/compare
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5080/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    # Note: extractor is *not* in depends_on — it lives behind the
    # `upload` profile and is only needed when the user uploads a doc
    # via the browser. Letting the API start without it keeps the
    # baseline stack at ~500MB instead of ~720MB.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: tradepro-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      # Vite reads .env.development at build/start, but if the operator
      # wants to override the API URL (e.g. point at a Codespace tunnel),
      # they can set VITE_API_BASE_URL in compose .env.
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:5080}"
    volumes:
      - ./frontend:/app
      # Help.tsx imports `../../../docs/ARCHITECTURE.md?raw` — from
      # /app/src/pages/Help.tsx that resolves to /docs/...; mount the repo's
      # docs/ at /docs so the resolution works inside the container.
      # Read-only because the frontend doesn't (and shouldn't) write docs.
      - ./docs:/docs:ro
      # Keep node_modules inside the container — host's macOS arm64
      # node_modules can't be reused by the linux container.
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started

  # Document extractor sidecar — small FastAPI service the API
  # forwards browser-uploaded files to. PyMuPDF for PDFs (fast,
  # robust), trafilatura for HTML (boilerplate stripping), pass-
  # through for TXT / MD. Stateless: the service writes nothing
  # to disk except the per-request temp file (deleted in handler).
  #
  # On-demand only: gated behind the `upload` profile so the
  # baseline stack doesn't pay the ~220MB resident cost just to
  # keep an idle Python service alive. Start it when you want to
  # upload:
  #     docker compose --profile upload up -d extractor
  # Stop when you're done:
  #     docker compose stop extractor
  # The API returns a friendly 502 with these instructions if a
  # browser upload arrives while the extractor is down.
  extractor:
    profiles: ["upload"]
    build:
      context: ./strategies
      dockerfile: Dockerfile.extractor
    container_name: tradepro-extractor
    ports:
      # Host-exposed mainly for ad-hoc curl testing; the API talks
      # to it over the compose network not via host:port.
      - "${EXTRACTOR_PORT:-8001}:8000"
    environment:
      TRADEPRO_EXTRACTOR_PORT: "8000"
      TRADEPRO_EXTRACTOR_HOST: "0.0.0.0"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

volumes:
  frontend_node_modules:
  api_compare_cache:
