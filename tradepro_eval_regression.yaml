# TradePro Eval Regression Suite
# Track 1 of the TradePro Test Case Framework
# Version: 1.0 — 22 May 2026
#
# PURPOSE
# Frozen panel of tickers with expected bucket/trace assertions.
# Run after any signal engine change to detect regressions.
# These are NOT live trading recommendations — they are system behaviour anchors.
#
# HOW TO USE
# 1. Run `uv run tradepro-regression-panel` (loads this YAML + hits the API)
# 2. Compare actual bucket + key trace flags against `expected` block
# 3. A PASS means the system behaves consistently with the documented baseline
# 4. A FAIL means either (a) a regression, or (b) market conditions have shifted
#    enough that the frozen expectation needs a deliberate manual update
#
# UPDATING EXPECTATIONS
# Never update expected values automatically. Only update after:
# - Deliberate signal engine change (document in changelog below)
# - Confirmed market regime shift (document date and reason)
#
# KNOWN BUGS (do not fix expectations to hide these — they are the point)
# BUG-001: today_bucket fires BUY even when Ichimoku + 200d SMA trend filters fail
#           Root cause: family-weighting imbalance (5/9 filters are trend family)
#           Affected cases: signal-coherence-bug category
# BUG-002: today_bucket and entry_signal can contradict within same API response
#           Affected cases: any ticker where trend and momentum diverge
# BUG-003: Finnhub analyst upgrades feed returns 0 events despite real PT changes
#           Affected cases: earnings-adjacent category
#
# CHANGELOG
# v1.0 — 22 May 2026 — Initial frozen panel

meta:
  version: "1.0"
  created: "2026-05-22"
  engine_version: null        # fill in current TradePro backend version when running
  notes: >
    Expectations set from live evaluation sessions in May 2026.
    Market context at freeze: US equities in mild bull trend post-tariff relief,
    ABBV recovering from Q1 earnings beat, BABA elevated volatility from
    US-China trade uncertainty, APLD speculative AI infrastructure play.

