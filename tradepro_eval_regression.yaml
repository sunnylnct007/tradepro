# Expected: decide page and research page must not contradict for same ticker
# Purpose: BUG-002 surface area — UI coherence across pages
# ─────────────────────────────────────────────────────────────────────────────

  - id: CSC-001
    category: cross-system-contradiction
    ticker: "9984.T"
    name: "SoftBank Group Corp"
    exchange: TSE
    description: >
      Live contradiction observed: Decide page showed BUY, Research page
      showed SELL for the same ticker in the same session. This is
      actively dangerous. Tests that both pages return the same top-level
      verdict for any given ticker.
    expected:
      decide_bucket: null           # do not freeze direction — market-dependent
      research_verdict: null        # do not freeze direction — market-dependent
      decide_vs_research_consistent: true   # THIS is the assertion — they must match
    known_bugs_present: [BUG-002]
    freeze_date: "2026-05-21"
    notes: >
      The direction (BUY/SELL) is not frozen here because it is market-dependent.
      The ONLY assertion is that decide and research agree with each other.
      Add MU, ORCL as CSC-002/003 once baseline contradictions are documented.
