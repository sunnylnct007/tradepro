# ─────────────────────────────────────────────────────────────────────────────
# CATEGORY 3: SIGNAL-COHERENCE-BUG
# Expected: documents the KNOWN broken behaviour
# Purpose: These cases exist to DETECT when BUG-001/002 is fixed,
#          and to prevent the bug spreading to new tickers silently
# ─────────────────────────────────────────────────────────────────────────────

  - id: SCB-001
    category: signal-coherence-bug
    ticker: BABA
    name: "Alibaba Group Holding Ltd (ADR)"
    exchange: NYSE
    description: >
      Primary signal-coherence bug demonstration case. Bucket fires BUY
      despite Ichimoku + 200d SMA trend filters both failing. Root cause:
      5 of 9 filters are momentum family, so momentum overrides trend veto.
      High volatility (48.1%) amplifies the false positive risk.
    expected:
      # What the system ACTUALLY does (broken behaviour — document it):
      swing_bucket: BUY             # system says BUY — this is the bug
      trend_filters_passing: false  # Ichimoku below cloud, price below 200d SMA
      momentum_filters_passing: true
      # What the system SHOULD do when BUG-001 is fixed:
      correct_bucket_post_fix: HOLD_OR_AVOID
      coherence_check: FAIL         # entry_signal and today_bucket should not contradict
    known_bugs_present: [BUG-001, BUG-002]
    freeze_date: "2026-05-21"
    notes: >
      When BUG-001 is fixed, this case's expected.swing_bucket should be
      updated to HOLD_OR_AVOID and known_bugs_present cleared.
      Do not update until the fix is deliberately shipped and reviewed.

  - id: SCB-002
    category: signal-coherence-bug
    ticker: ABBV
    name: "AbbVie Inc — coherence check variant"
    exchange: NYSE
    description: >
      Same ticker as CP-001 but specifically tests the entry_signal vs
      today_bucket contradiction (BUG-002). Even on a genuine BUY, the
      two fields must agree. This case is green when both fields say BUY
      and red when they contradict.
    expected:
      today_bucket: BUY
      entry_signal: BUY             # must match today_bucket
      coherence_check: PASS         # FAIL if the two fields contradict
    known_bugs_present: [BUG-002]
    freeze_date: "2026-05-21"
    notes: >
      BUG-002 is actively dangerous — contradictory signals displayed
      simultaneously in UI could cause bad trades. This is the highest
      priority fix in the signal engine.

  - id: SCB-003
    category: signal-coherence-bug
    ticker: APLD
    name: "Applied Digital Corporation"
    exchange: NASDAQ
    description: >
      High-vol AI infrastructure play. At peak evaluation (May 2026),
      speculative momentum drove BUY bucket despite thin fundamental support.
      Tests whether trend veto appropriately suppresses high-vol chase signals.
    expected:
      swing_bucket: BUY             # system says BUY — coherence bug present
      volatility_flag: HIGH         # vol filter should flag this
      trend_filters_passing: false  # trend recovery not confirmed
      coherence_check: FAIL
      correct_bucket_post_fix: WATCH_OR_AVOID
    known_bugs_present: [BUG-001]
    freeze_date: "2026-05-21"
    notes: >
      Represents the "high-vol chase" failure mode where momentum overwhelms
      the trend veto. Pair with HVC-001 below.

