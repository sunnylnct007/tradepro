# ─────────────────────────────────────────────────────────────────────────────
# CATEGORY 7: STALE-FEED CANARY
# Expected: data feed must return fresh data; stale or null must surface as error
# Purpose: Catch data pipeline failures before they produce phantom signals
# ─────────────────────────────────────────────────────────────────────────────

  - id: SFC-001
    category: stale-feed-canary
    ticker: VUKE.L
    name: "iShares Core FTSE 100 UCITS ETF"
    exchange: LSE
    description: >
      UK feed reliability test. .L suffix tickers are a known fragile path.
      If price data is null or >24h stale, the system must surface an error
      rather than computing signals on bad data.
    expected:
      data_age_hours: "<24"
      price_non_null: true
      feed_error_surfaced_on_failure: true   # must not silently produce signals on stale data
    known_bugs_present: []
    freeze_date: "2026-05-22"
    notes: "Run this case first in any CI pipeline — feed failure invalidates all other results."

  - id: SFC-002
    category: stale-feed-canary
    ticker: SI=F
    name: "Silver Futures (front month continuous)"
    exchange: CME
    description: >
      Futures feed canary. Tests that Yahoo Finance =F suffix resolves
      to front-month contract and returns valid OHLCV data. Also checks
      roll proximity warning (within 5 days of expiry → confidence degraded).
    expected:
      data_age_hours: "<24"
      price_non_null: true
      contract_identified: true     # must resolve to a specific expiry, not null
      roll_warning_present: false   # true only if within 5 days of expiry
      feed_error_surfaced_on_failure: true
    known_bugs_present: []
    freeze_date: "2026-05-22"
    notes: >
      SI=F was evaluated ad-hoc in live session. This formalises it as a
      feed health check for the futures pipeline (Phase 4C).

# ─────────────────────────────────────────────────────────────────────────────
