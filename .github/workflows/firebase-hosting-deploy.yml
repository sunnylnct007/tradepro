name: Deploy frontend to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/firebase-hosting-deploy.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build & deploy (live channel)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SMSP_291E3 }}
          projectId: smsp-291e3
          channelId: live
          entryPoint: frontend
