name: aws-api-logs

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  AWS_ROLE_ARN: arn:aws:iam::108703420282:role/ccit-dev-energycosmos-deploy
  INSTANCE_NAME_PREFIX: ccit-dev-tradepro-host

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - id: find
        run: |
          ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${INSTANCE_NAME_PREFIX}*" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          echo "instance_id=$ID" >> "$GITHUB_OUTPUT"
      - run: |
          cat > /tmp/x.sh <<'EOF'
          cd /opt/tradepro
          echo === ps ===
          docker compose -f docker-compose.aws.yaml ps
          echo
          echo === api logs last 200 lines ===
          docker compose -f docker-compose.aws.yaml logs --tail=200 api 2>&1
          EOF
          jq -n --arg s "$(cat /tmp/x.sh)" '{commands: [$s]}' > /tmp/p.json
          CMD=$(aws ssm send-command \
            --instance-ids "${{ steps.find.outputs.instance_id }}" \
            --document-name AWS-RunShellScript \
            --parameters file:///tmp/p.json \
            --output text --query 'Command.CommandId')
          for i in $(seq 1 30); do
            S=$(aws ssm get-command-invocation \
              --command-id "$CMD" \
              --instance-id "${{ steps.find.outputs.instance_id }}" \
              --query 'Status' --output text 2>/dev/null || echo Pending)
            if [ "$S" = "Success" ] || [ "$S" = "Failed" ]; then
              echo "status=$S"; break
            fi
            sleep 3
          done
          aws ssm get-command-invocation \
            --command-id "$CMD" \
            --instance-id "${{ steps.find.outputs.instance_id }}" \
            --query 'StandardOutputContent' --output text | head -300
